<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>NeRF Density Point Cloud Viewer</title>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: #111;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    #info {
      position: absolute;
      top: 16px;
      left: 16px;
      color: white;
      background: rgba(0, 0, 0, 0.55);
      padding: 10px 12px;
      border-radius: 10px;
      font-size: 14px;
      line-height: 1.45;
      z-index: 10;
    }

    #colorbar-container {
      position: absolute;
      top: 50%;
      right: 24px;
      transform: translateY(-50%);
      color: white;
      background: rgba(0, 0, 0, 0.55);
      padding: 14px 14px 12px 14px;
      border-radius: 12px;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    #colorbar-title {
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 4px;
      text-align: center;
    }

    #colorbar-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    #colorbar {
      width: 24px;
      height: 260px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.65);

      /*
        Approximate matplotlib "inferno" colormap:
        low density at bottom, high density at top.
      */
      background: linear-gradient(
        to top,
        #000004 0%,
        #1b0c41 20%,
        #4a0c6b 40%,
        #781c6d 55%,
        #a52c60 68%,
        #cf4446 80%,
        #ed6925 90%,
        #fb9b06 96%,
        #fcffa4 100%
      );
    }

    #colorbar-labels {
      height: 260px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      font-size: 12px;
      color: #eee;
    }

    .tick-label {
      white-space: nowrap;
    }

    #colorbar-note {
      max-width: 150px;
      font-size: 11px;
      color: #ccc;
      text-align: center;
      line-height: 1.3;
    }

    #threshold-control {
      position: absolute;
      left: 50%;
      bottom: 22px;
      transform: translateX(-50%);
      width: min(640px, calc(100vw - 48px));
      color: white;
      background: rgba(0, 0, 0, 0.55);
      padding: 12px 16px 14px;
      border-radius: 10px;
      z-index: 10;
    }

    #threshold-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 16px;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    #density-percentile-value {
      color: #ddd;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }

    #density-percentile-slider {
      width: 100%;
      display: block;
    }

    #threshold-ticks {
      display: flex;
      justify-content: space-between;
      margin-top: 4px;
      font-size: 12px;
      color: #ddd;
    }
  </style>
</head>

<body>
  <div id="info">
    <strong>NeRF Density Point Cloud</strong><br>
    Left drag: orbit<br>
    Scroll: zoom<br>
    Right drag: pan
  </div>

  <div id="colorbar-container">
    <div id="colorbar-title">Density σ</div>

    <div id="colorbar-row">
      <div id="colorbar"></div>

      <div id="colorbar-labels">
        <div class="tick-label">99th percentile</div>
        <div class="tick-label">High</div>
        <div class="tick-label">Medium</div>
        <div class="tick-label">Low</div>
        <div class="tick-label">5th percentile</div>
      </div>
    </div>

    <div id="colorbar-note">
      Colors show normalized density values from the exported point cloud.
    </div>
  </div>

  <div id="threshold-control">
    <div id="threshold-header">
      <label for="density-percentile-slider">Density threshold</label>
      <span id="density-percentile-value">0th percentile</span>
    </div>

    <input
      id="density-percentile-slider"
      type="range"
      min="0"
      max="99"
      step="1"
      value="0"
    />

    <div id="threshold-ticks" aria-hidden="true">
      <span>0th percentile</span>
      <span>99th percentile</span>
    </div>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.166.1/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.166.1/examples/jsm/"
    }
  }
  </script>

  <script type="module" src="./main.js"></script>
</body>
</html>
